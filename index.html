<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login/Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

:root {
    --primary-red: #e74c3c;
    --dark-red: #c0392b;
    --light-gray: #f2f2f2;
    --dark-gray: #333;
    --text-color: #555;
    --white: #ffffff;
}

body {
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, var(--primary-red) 0%, var(--dark-red) 100%);
    overflow: hidden; /* Hide overflowing shapes */
}

.container {
    background: var(--white);
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    width: 90%;
    max-width: 400px;
    overflow: hidden;
    position: relative;
    padding: 30px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: all 0.5s ease-in-out;
}

/* Background decorative shapes */
.container::before,
.container::after {
    content: '';
    position: absolute;
    background: var(--dark-red);
    opacity: 0.1;
    z-index: 0;
}

.container::before {
    width: 150px;
    height: 150px;
    top: -50px;
    left: -50px;
    border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; /* Polygon-like effect */
    transform: rotate(45deg);
}

.container::after {
    width: 120px;
    height: 120px;
    bottom: -40px;
    right: -40px;
    border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; /* Polygon-like effect */
    transform: rotate(135deg);
}

.form-panel {
    width: 100%;
    position: absolute;
    top: 0;
    left: 0;
    padding: 30px;
    box-sizing: border-box;
    transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
    opacity: 0;
    transform: translateX(100%);
    z-index: 1; /* Ensure forms are above decorative shapes */
}

.form-panel.active {
    opacity: 1;
    transform: translateX(0);
    position: static; /* Take up space when active */
}

.form-panel h2 {
    color: var(--dark-gray);
    margin-bottom: 25px;
    font-size: 2em;
    font-weight: 600;
}

.input-group {
    margin-bottom: 20px;
}

.input-group input {
    width: calc(100% - 20px);
    padding: 12px 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1em;
    color: var(--dark-gray);
    outline: none;
    transition: border-color 0.3s ease;
}

.input-group input:focus {
    border-color: var(--primary-red);
}

.btn {
    background: var(--primary-red);
    color: var(--white);
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
    width: 100%;
    margin-top: 15px;
}

.btn:hover {
    background: var(--dark-red);
    transform: translateY(-2px);
}

p {
    margin-top: 25px;
    color: var(--text-color);
}

p a {
    color: var(--primary-red);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

p a:hover {
    color: var(--dark-red);
    text-decoration: underline;
}

/* Responsive adjustments */
@media (max-width: 500px) {
    .container {
        padding: 20px;
        border-radius: 10px;
    }

    .form-panel {
        padding: 20px;
    }

    .form-panel h2 {
        font-size: 1.8em;
    }

    .btn {
        padding: 10px 20px;
        font-size: 1em;
    }
}
</style>
<body>
    <div class="container">
        <div class="form-panel login-panel active">
            <h2>Login</h2>
            <form>
                <div class="input-group">
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p>Don't have an account? <a href="#" id="showSignup">Sign Up</a></p>
        </div>

        <div class="form-panel signup-panel">
            <h2>Sign Up</h2>
            <form>
                <div class="input-group">
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <p>Already have an account? <a href="#" id="showLogin">Login</a></p>
        </div>
    </div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
    const showSignupLink = document.getElementById('showSignup');
    const showLoginLink = document.getElementById('showLogin');
    const loginPanel = document.querySelector('.login-panel');
    const signupPanel = document.querySelector('.signup-panel');
    const container = document.querySelector('.container');

    // Function to switch panels
    const switchPanel = (panelToShow, panelToHide) => {
        // First, set the height of the container to match the current active panel to avoid jumpiness
        container.style.height = `${panelToHide.offsetHeight}px`;

        panelToHide.classList.remove('active');
        // Give a small delay for the animation to start before making it absolute
        setTimeout(() => {
            panelToHide.style.position = 'absolute';
            panelToHide.style.transform = panelToShow === loginPanel ? 'translateX(100%)' : 'translateX(-100%)';
            panelToHide.style.opacity = '0';

            panelToShow.style.position = 'static'; // Take up space
            panelToShow.style.transform = 'translateX(0)';
            panelToShow.style.opacity = '1';
            panelToShow.classList.add('active');

            // Adjust container height to the new active panel's height after animation
            container.style.height = `${panelToShow.offsetHeight}px`;
        }, 50); // A small delay

        // Reset height after transition to allow content to adjust naturally if needed
        setTimeout(() => {
            container.style.height = 'auto';
        }, 550); // Matches CSS transition duration + small buffer
    };

    if (showSignupLink) {
        showSignupLink.addEventListener('click', (e) => {
            e.preventDefault();
            switchPanel(signupPanel, loginPanel);
        });
    }

    if (showLoginLink) {
        showLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            switchPanel(loginPanel, signupPanel);
        });
    }

    // Initialize container height based on the active panel
    // This is important for the first load to prevent content jumping
    // when switching forms for the first time.
    if (loginPanel.classList.contains('active')) {
        container.style.height = `${loginPanel.offsetHeight}px`;
    } else if (signupPanel.classList.contains('active')) {
        container.style.height = `${signupPanel.offsetHeight}px`;
    }
    // Set height to auto after a short delay to allow content to adjust naturally
    setTimeout(() => {
        container.style.height = 'auto';
    }, 50);
});
</script>
    <script src="script.js"></script>
</body>
</html>
